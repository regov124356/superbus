<section id="contact" class="section">
  <div class="container">
    <div class="section-header">
      <h2>Skontaktuj się z nami</h2>
    </div>

    <div class="grid">
      <article class="card" *ngFor="let card of cards">
        <div class="icon-wrap"><span class="material-symbols-outlined mono-icon">{{ card.icon }}</span></div>
        <div>
          <h3>{{ card.title }}</h3>
          <p *ngFor="let line of card.lines">{{ line }}</p>
        </div>
      </article>
    </div>
  </div>
</section>
