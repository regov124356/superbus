<section id="booking" class="section">
  <div class="container">
    <div class="section-header">
      <h2>Zamów Bus</h2>
      <p>Wypełnij formularz, a my skontaktujemy się z Tobą z ofertą dopasowaną do Twoich potrzeb</p>
    </div>

    <div class="card">
      <form (ngSubmit)="submit()" #bookingForm="ngForm">
        <div class="grid two">
          <div class="field">
            <label for="name">Imię i nazwisko *</label>
            <input id="name" name="name" [(ngModel)]="formData.name" required />
          </div>
          <div class="field">
            <label for="email">Email *</label>
            <input id="email" name="email" type="email" [(ngModel)]="formData.email" required />
          </div>
        </div>

        <div class="grid two">
          <div class="field">
            <label for="phone">Telefon *</label>
            <input id="phone" name="phone" [(ngModel)]="formData.phone" required />
          </div>
          <div class="field">
            <label for="passengers">Liczba pasażerów *</label>
            <input id="passengers" name="passengers" type="number" min="1" max="100" [(ngModel)]="formData.passengers" required />
          </div>
        </div>

        <div class="grid two">
          <div class="field">
            <label for="pickupLocation">Miejsce wyjazdu *</label>
            <input id="pickupLocation" name="pickupLocation" [(ngModel)]="formData.pickupLocation" required />
          </div>
          <div class="field">
            <label for="destination">Miejsce docelowe *</label>
            <input id="destination" name="destination" [(ngModel)]="formData.destination" required />
          </div>
        </div>

        <div class="grid two">
          <div class="field">
            <label for="date">Data wyjazdu *</label>
            <input id="date" name="date" type="date" [(ngModel)]="formData.date" required />
          </div>
          <div class="field">
            <label for="time">Godzina wyjazdu *</label>
            <input id="time" name="time" type="time" [(ngModel)]="formData.time" required />
          </div>
        </div>

        <div class="grid two">
          <div class="field">
            <label for="returnDate">Data powrotu</label>
            <input id="returnDate" name="returnDate" type="date" [(ngModel)]="formData.returnDate" />
          </div>
          <div class="field">
            <label for="returnTime">Godzina powrotu</label>
            <input id="returnTime" name="returnTime" type="time" [(ngModel)]="formData.returnTime" />
          </div>
        </div>

        <div class="field">
          <label for="additionalInfo">Dodatkowe informacje</label>
          <textarea id="additionalInfo" name="additionalInfo" rows="4" [(ngModel)]="formData.additionalInfo"></textarea>
        </div>

        <div class="info">* Pola wymagane. Po wysłaniu formularza skontaktujemy się z Tobą w ciągu 24 godzin.</div>

        <button type="submit" [disabled]="bookingForm.invalid">Wyślij zapytanie ofertowe</button>
      </form>
    </div>
  </div>
</section>
